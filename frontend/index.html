<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pri Massas Artesanais - Cardápio</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #fdf8f5; color: #333; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        h1 { color: #8b0000; text-align: center; }
        input, button { width: 100%; padding: 10px; margin: 5px 0; box-sizing: border-box; }
        button { background-color: #2e8b57; color: white; border: none; cursor: pointer; font-weight: bold; }
        button:hover { background-color: #246b43; }
        .massa-item { background: #fff3e0; margin: 10px 0; padding: 10px; border-left: 5px solid #ff8c00; display: flex; justify-content: space-between; align-items: center; }
        .btn-apagar { background-color: #dc3545; padding: 5px 10px; font-size: 12px; width: auto; }
        .btn-apagar:hover { background-color: #c82333; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🍝 Pri Massas Artesanais</h1>
        
        <h3>Cadastrar Nova Massa</h3>
        <input type="text" id="nomeMassa" placeholder="Nome da Massa (Ex: Nhoque ao Sugo)">
        <input type="number" id="precoMassa" placeholder="Preço (Ex: 45.90)">
        <button onclick="salvarMassa()">Adicionar ao Cardápio</button>

        <h3>Cardápio Atual</h3>
        <div id="listaMassas">
            <p style="text-align: center; color: #666;">Carregando cardápio...</p>
        </div>
    </div>

    <script>
        // URL da API no Render (CORRIGIDA)
        const API_URL = "https://projeto-primassas.onrender.com/api/produtos";

        // Função para buscar as massas no servidor
        async function carregarCardapio() {
            try {
                const resposta = await fetch(API_URL);
                
                if (!resposta.ok) {
                    throw new Error(`Erro HTTP: ${resposta.status}`);
                }
                
                const massas = await resposta.json();
                
                const divLista = document.getElementById('listaMassas');
                
                if (massas.length === 0) {
                    divLista.innerHTML = '<p style="text-align: center; color: #666;">Nenhuma massa cadastrada ainda.</p>';
                    return;
                }

                divLista.innerHTML = ''; // Limpa a lista antes de mostrar

                massas.forEach(massa => {
                    divLista.innerHTML += `
                        <div class="massa-item">
                            <div>
                                <strong>${massa.nome}</strong> - R$ ${massa.preco.toFixed(2)}
                                ${massa.quantidade ? `<br><small>Estoque: ${massa.quantidade}</small>` : ''}
                            </div>
                            <button class="btn-apagar" onclick="apagarMassa('${massa._id}')">🗑️ Apagar</button>
                        </div>
                    `;
                });
            } catch (erro) {
                console.error("Erro ao carregar:", erro);
                document.getElementById('listaMassas').innerHTML = '<p style="text-align: center; color: red;">Erro ao carregar cardápio. Verifique a conexão.</p>';
            }
        }

        // Função para salvar uma nova massa no banco de dados
        async function salvarMassa() {
            const nome = document.getElementById('nomeMassa').value;
            const preco = document.getElementById('precoMassa').value;

            if(!nome || !preco) {
                alert("Por favor, preencha o nome e o preço da massa!");
                return;
            }

            const btn = event.target;
            const textoOriginal = btn.innerText;
            btn.innerText = "Salvando...";
            btn.disabled = true;

            try {
                const resposta = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        nome: nome, 
                        preco: Number(preco),
                        quantidade: 0 
                    })
                });

                if (!resposta.ok) {
                    throw new Error(`Erro HTTP: ${resposta.status}`);
                }

                document.getElementById('nomeMassa').value = '';
                document.getElementById('precoMassa').value = '';
                await carregarCardapio();
                alert("Massa cadastrada com sucesso!");
                
            } catch(erro) {
                console.error("Erro ao salvar:", erro);
                alert("Erro ao salvar: " + erro.message);
            } finally {
                btn.innerText = textoOriginal;
                btn.disabled = false;
            }
        }

        // Função para APAGAR uma massa (é isso que você precisava!)
        async function apagarMassa(id) {
            if(!confirm("⚠️ Tem certeza que deseja apagar esta massa permanentemente?")) {
                return;
            }
            
            try {
                const resposta = await fetch(`${API_URL}/${id}`, {
                    method: 'DELETE'
                });
                
                if (resposta.ok) {
                    alert("✅ Massa apagada com sucesso!");
                    await carregarCardapio(); // Recarrega a lista
                } else if (resposta.status === 404) {
                    alert("❌ Massa não encontrada!");
                } else {
                    const erro = await resposta.text();
                    alert(`❌ Erro ao apagar: ${resposta.status} - ${erro}`);
                }
            } catch(erro) {
                console.error("Erro na requisição:", erro);
                alert("❌ Erro de conexão com o servidor. Verifique sua internet.");
            }
        }

        // Carrega o cardápio assim que a página abre
        carregarCardapio();
    </script>
</body>
</html>
