<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pri Massas - Gestão</title>
    <style>
        :root { --vinho: #722F37; --oliva: #556B2F; --creme: #fdf5e6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--creme); display: flex; justify-content: center; padding: 20px; }
        .app-card { width: 100%; max-width: 450px; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        h1 { color: var(--vinho); text-align: center; margin-bottom: 25px; }
        
        input { width: 100%; padding: 12px; margin: 8px 0; border: 2px solid #eee; border-radius: 10px; box-sizing: border-box; font-size: 16px; }
        .btn-salvar { width: 100%; padding: 15px; background: var(--oliva); color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        
        .lista-itens { margin-top: 30px; }
        .item { background: #fff; margin: 12px 0; padding: 15px; border-radius: 15px; border: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; }
        .btn-acao { border: none; padding: 8px 12px; border-radius: 8px; cursor: pointer; font-weight: bold; margin-left: 5px; }
        .btn-add { background: #e8f5e9; color: var(--oliva); border: 1px solid var(--oliva); }
        .btn-del { background: #ffebee; color: #c62828; border: 1px solid #c62828; }
        
        .info b { color: #333; font-size: 1.1rem; }
        .info span { color: #666; font-size: 0.85rem; display: block; margin-top: 3px; }
    </style>
</head>
<body>

<div class="app-card">
    <h1>🍝 Gestão de Estoque</h1>
    
    <input type="text" id="nomeMassa" placeholder="Nome da Massa">
    <div style="display: flex; gap: 10px;">
        <input type="number" id="precoMassa" placeholder="Preço R$">
        <input type="number" id="qtdMassa" placeholder="Qtd Inicial">
    </div>
    <button class="btn-salvar" onclick="salvar()">Cadastrar Produto</button>

    <div class="lista-itens" id="lista"></div>
</div>

<script>
    // USANDO IP DIRETO PARA EVITAR BLOQUEIO DO NAVEGADOR
    const API = "http://127.0.0.1:3000/api/produtos";

    async function atualizar() {
        try {
            const res = await fetch(API);
            const dados = await res.json();
            const listaDiv = document.getElementById('lista');
            listaDiv.innerHTML = '';

            dados.forEach(p => {
                listaDiv.innerHTML += `
                    <div class="item">
                        <div class="info">
                            <b>${p.nome}</b>
                            <span>Estoque: ${p.quantidade || 0} | R$ ${p.preco.toFixed(2)}</span>
                        </div>
                        <div>
                            <button class="btn-acao btn-add" onclick="somarEstoque('${p._id}')">+ Add</button>
                            <button class="btn-acao btn-del" onclick="apagar('${p._id}')">🗑️</button>
                        </div>
                    </div>
                `;
            });
        } catch (e) {
            console.log("Erro de conexão. Tentando alternativa...");
        }
    }

    async function salvar() {
        const nome = document.getElementById('nomeMassa').value;
        const preco = document.getElementById('precoMassa').value;
        const quantidade = document.getElementById('qtdMassa').value;

        if(!nome || !preco) return alert("Preencha os campos!");

        await fetch(API, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ nome, preco: Number(preco), quantidade: Number(quantidade) })
        });
        
        limpar();
        atualizar();
    }

    async function apagar(id) {
        if(confirm("Deseja apagar este produto?")) {
            await fetch(`${API}/${id}`, { method: 'DELETE' });
            atualizar();
        }
    }

    async function somarEstoque(id) {
        const valor = prompt("Quantas unidades deseja ADICIONAR?");
        if(valor) {
            await fetch(`${API}/${id}/adicionar`, {
                method: 'PATCH',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ quantidadeAdicional: Number(valor) })
            });
            atualizar();
        }
    }

    function limpar() {
        document.getElementById('nomeMassa').value = '';
        document.getElementById('precoMassa').value = '';
        document.getElementById('qtdMassa').value = '';
    }

    atualizar();
</script>
</body>
</html>
